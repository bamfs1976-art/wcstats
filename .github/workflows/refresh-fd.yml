name: Refresh results & standings

on:
  schedule:
    - cron: '15 */6 * * *'   # every 6 hours; tighten during live match days if wanted
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Rebuild FD data from ESPN's public API
        run: python3 data/build_espn.py

      - name: Sync inline blocks in index.html
        run: python3 data/sync_inline.py

      - name: Commit if changed
        run: |
          if git diff --quiet; then
            echo "No data changes."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html data/fd_extra.js data/fd_standings.js
          git commit -m "Auto-refresh FD results/standings from ESPN API"
          git push
