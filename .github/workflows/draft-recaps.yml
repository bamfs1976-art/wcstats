name: Draft match recaps

on:
  workflow_dispatch:
    inputs:
      apply:
        description: "Insert drafts for keys missing from RESULTS into index.html"
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  recaps:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Anthropic SDK
        run: pip install anthropic

      - name: Draft recaps with Claude
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          cd data
          if [ "${{ inputs.apply }}" = "true" ]; then
            python3 build_recaps.py --apply
          else
            python3 build_recaps.py
          fi

      - name: Commit if changed
        run: |
          if git diff --quiet && [ -z "$(git status --porcelain data/recaps_suggested.js)" ]; then
            echo "No recap changes."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/recaps_suggested.js index.html
          git commit -m "Draft match recaps via Claude (build_recaps.py)"
          git push
